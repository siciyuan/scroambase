name: ScroamDB
version: 1.0.0
main: com.scroam.db.ScroamDB
api-version: '1.21'
description: ScroamDB - Database and Economy System Plugin with Payment and Treasury
author: Scroam

commands:
  scroamdb:
    description: ScroamDB main command
    usage: /scroamdb reload
  eco:
    description: Economy system commands
    usage: /eco <command> [args...]
    aliases: [economy, money]

permissions:
  scroamdb.admin:
    description: Admin permission
    default: op