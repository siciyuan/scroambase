# ScroamShop 价格配置文件
# 物品收购价格配置
# 未配置的物品将使用默认垃圾价格

# 全局设置
settings:
  # 卖出价格比例（相对于收购价格）
  # 例如：0.2 表示卖出价格为收购价格的20%
  sell-price-ratio: 0.2
  # 默认垃圾物品收购价格
  default-trash-price: 0.1

# 物品价格配置
# 格式：物品名称: 价格
# 物品名称必须与 Minecraft Material 名称一致
items:
  # ============ 垃圾物品 (0.1) ============
  # 这些物品已经使用默认价格，可以删除或修改
  
  # ============ 石头类 (0.5) ============
  COBBLESTONE: 0.5
  STONE: 0.5
  GRANITE: 0.5
  DIORITE: 0.5
  ANDESITE: 0.5
  SANDSTONE: 0.5
  RED_SANDSTONE: 0.5
  COBBLED_DEEPSLATE: 0.5
  DEEPSLATE: 0.5
  TUFF: 0.5
  GRAVEL: 0.5
  SAND: 0.5
  RED_SAND: 0.5
  
  # ============ 矿物粒 (中价) ============
  IRON_NUGGET: 5.0
  GOLD_NUGGET: 10.0
  COPPER_NUGGET: 3.0
  
  # ============ 矿物锭 (高价) ============
  IRON_INGOT: 50.0
  GOLD_INGOT: 100.0
  COPPER_INGOT: 30.0
  DIAMOND: 500.0
  EMERALD: 600.0
  NETHERITE_INGOT: 5000.0
  QUARTZ: 20.0
  AMETHYST_SHARD: 15.0
  LAPIS_LAZULI: 40.0
  
  # ============ 矿物块 (超高价) ============
  IRON_BLOCK: 500.0
  GOLD_BLOCK: 1000.0
  COPPER_BLOCK: 300.0
  DIAMOND_BLOCK: 5000.0
  EMERALD_BLOCK: 6000.0
  NETHERITE_BLOCK: 50000.0
  LAPIS_BLOCK: 400.0
  
  # ============ 原矿 (中高价) ============
  COAL: 2.0
  RAW_IRON: 25.0
  RAW_GOLD: 50.0
  RAW_COPPER: 15.0
  
  # ============ 彩蛋物品 (超高价) ============
  # 毒马铃薯 - 稀有彩蛋物品
  POISONOUS_POTATO: 1000.0
  
  # ============ 其他物品 ============
  # 可以继续添加更多物品价格