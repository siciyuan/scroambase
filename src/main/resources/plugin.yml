name: ScroamDB
version: 1.0.0
main: com.scroam.db.ScroamDB
api-version: '1.21'
description: ScroamDB - Database, Economy and Login System Plugin
author: Scroam
depend: []
soft-depend: []

commands:
  scroamdb:
    description: ScroamDB main command
    usage: /scroamdb reload
    permission: scroamdb.admin
  eco:
    description: Economy system commands
    usage: /eco <command> [args...]
    aliases: [economy, money]
  login:
    description: Login to the server
    usage: /login <password>
  register:
    description: Register a new account
    usage: /register <password> <confirmPassword>
  changepassword:
    description: Change password
    usage: /changepassword <oldPassword> <newPassword>
    aliases: [cp]
  logout:
    description: Logout from the server
    usage: /logout
  signin:
    description: Open sign-in GUI
    usage: /signin
    aliases: [签到]

permissions:
  scroamdb.admin:
    description: Admin permission for ScroamDB
    default: op
  scroamdb.economy.pay:
    description: Allow to pay other players
    default: true
  scroamdb.economy.balance:
    description: Allow to check balance
    default: true
  scroamdb.economy.treasury:
    description: Allow to manage treasury
    default: op
  scroamdb.login.bypass:
    description: Bypass login requirement
    default: op